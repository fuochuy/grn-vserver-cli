name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -e
          cd go
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o ../grn-linux-amd64   .
          CGO_ENABLED=0 GOOS=linux   GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o ../grn-linux-arm64   .
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o ../grn-darwin-amd64  .
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o ../grn-darwin-arm64  .
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o ../grn-windows-amd64.exe .
          CGO_ENABLED=0 GOOS=windows GOARCH=386  go build -trimpath -ldflags="-s -w" -o ../grn-windows-386.exe  .

      - name: Generate checksums
        run: |
          cd go
          sha256sum \
            ../grn-linux-amd64 \
            ../grn-linux-arm64 \
            ../grn-darwin-amd64 \
            ../grn-darwin-arm64 \
            ../grn-windows-amd64.exe \
            ../grn-windows-386.exe \
            > ../checksums.txt
          cat ../checksums.txt

      - name: Extract release notes
        id: notes
        run: |
          python3 scripts/extract-release-notes "${{ steps.version.outputs.version }}" > /tmp/release-notes.md
          cat /tmp/release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: |
            grn-linux-amd64
            grn-linux-arm64
            grn-darwin-amd64
            grn-darwin-arm64
            grn-windows-amd64.exe
            grn-windows-386.exe
            checksums.txt
          fail_on_unmatched_files: true
